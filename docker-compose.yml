version: "3.9"

services:
  db:
    image: postgres:16
    container_name: corkey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: corkey
      POSTGRES_USER: corkey
      POSTGRES_PASSWORD: corkey_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corkey -d corkey"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    container_name: corkey-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APP_DATABASE_URL: postgresql+psycopg://corkey:corkeypassword!@corkey-db.cp4m0guieqod.us-east-2.rds.amazonaws.com:5432/wine_db
      SECRET_KEY: wade_corkey_super_secret_key_2026
    volumes:
      - ./data:/app/data:ro

volumes:
  postgres_data:

