version: "3.9"

services:
  db:
    image: postgres:16
    container_name: corkey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: corkey
      POSTGRES_USER: corkey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corkey -d corkey"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: corkey-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # [변경점 1] 룸렌트 네트워크 환경을 위해 host 모드 추가
    # ports:
    #   - "8000:8000"
    network_mode: "host" 
    
    env_file:
      - .env
    
    environment:
      # [변경점 2] AWS RDS 주소 대신 로컬 DB 주소로 변경
      # APP_DATABASE_URL: postgresql+psycopg://corkey:corkeypassword!@corkey-db.cp4m0guieqod.us-east-2.rds.amazonaws.com:5432/wine_db
      - APP_DATABASE_URL=${APP_DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    
    volumes:
      - ./data:/app/data:ro
      - ./backend/cache:/app/cache

volumes:
  postgres_data:
